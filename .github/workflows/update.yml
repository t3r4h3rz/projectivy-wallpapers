name: Update wallpapers feed

on:
  schedule:
    - cron: '0 */6 * * *'   # cada 6 horas
  workflow_dispatch: {}      # permite ejecutarlo manualmente desde la pestaña Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Generate wallpapers.json
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          TRAKT_LIST_USER: ${{ secrets.TRAKT_LIST_USER }}
          TRAKT_LIST_SLUG: ${{ secrets.TRAKT_LIST_SLUG }}
        run: python generate_wallpapers.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wallpapers.json
          git diff --staged --quiet || git commit -m "Actualiza wallpapers.json"
          git push
